<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spicy Scooters Closed</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            color: #333;
            text-align: center;
            padding: 50px 20px;
        }

        img {
            max-width: 300px;
            height: auto;
            margin: 0 auto 30px auto;
            display: block;
        }

        h1 {
            font-size: 2em;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2em;
            margin-bottom: 20px;
        }

        a.email-button {
            display: inline-block;
            padding: 12px 25px;
            background-color: #ff5c5c;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        a.email-button:hover {
            background-color: #e04848;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5em;
            }

            p {
                font-size: 1em;
            }

            a.email-button {
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Logo -->
    <img src="logo.png" alt="Spicy Scooters Logo">

    <!-- Heading -->
    <h1>Spicy Scooters is Closed</h1>

    <!-- Message -->
    <p>Thank you to everyone who supported Spicy Scooters over the years.</p>
    <p>However, I’m still happy to help with custom one-off orders.</p>

    <!-- Email button -->
    <a href="mailto:your@email.com" class="email-button">Email Me for Custom Orders</a>

</body>
</html>
